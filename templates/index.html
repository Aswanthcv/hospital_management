{% extends 'base.html' %}
{% load static %}
 
{% block title %}Home{% endblock %}

{% block content %}
<div id="carouselExampleControls" class="carousel slide" data-bs-ride="carousel">
  <div class="carousel-inner">
    <div class="carousel-item active">
      
      <img class="d-block w-100" src="{% static 'images/hospital1.jpg' %}" alt="First slide">
    </div>
    <div class="carousel-item">
      <img class="d-block w-100" src="{% static 'images/hospital2.webp' %}" alt="Second slide">
    </div>
    <div class="carousel-item">
      <img class="d-block w-100" src="{% static 'images/hospital3.jpg' %}" alt="Third slide">
    </div>
  </div>
  <button class="carousel-control-prev" type="button"
        data-bs-target="#carouselExampleControls"
        data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
</button>

<button class="carousel-control-next" type="button"
        data-bs-target="#carouselExampleControls"
        data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
</button>
</div>
{% endblock %}
